<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yashu 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin-top:250px;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: 'Orbitron', 'Exo 2', sans-serif;
  color: #fff;
  text-align: center;
  overflow: hidden;
  /* Darker, less bright cyberpunk gradient */
  background: linear-gradient(135deg, #000000 0%, #0a0a1a 25%, #1a0f2e 50%, #0a0a1a 75%, #000000 100%);
  background-size: 400% 400%;
  /* animation: gradientShift 12s ease infinite; */
  position: relative;
  padding: 2rem; /* Added body padding */
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* STARFIELD */
.stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.star {
  position: absolute;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.3); }
}

/* GLOW EFFECT */
.glow {
  text-shadow: 
    0 0 15px rgba(0, 255, 255, 0.7),
    0 0 30px rgba(0, 255, 255, 0.5),
    0 0 50px rgba(255, 0, 255, 0.4);
  animation: pulseGlow 3s ease-in-out infinite alternate;
}

@keyframes pulseGlow {
  from { filter: brightness(1); }
  to { filter: brightness(1.1); }
}

/* TITLE */
h1 {
  font-size: clamp(2.2rem, 7vw, 4.5rem);
  font-weight: 900;
  margin-bottom: 1.5rem; /* Increased margin */
  letter-spacing: 0.08em;
  position: relative;
  padding: 0 1rem;
}

h1::after {
  content: '';
  position: absolute;
  bottom: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.8), rgba(255, 0, 255, 0.6), transparent);
  border-radius: 2px;
  animation: shimmer 4s infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.4; width: 80px; }
  50% { opacity: 1; width: 160px; }
}

/* MESSAGE */
.message {
  font-size: clamp(1rem, 2.8vw, 1.4rem);
  font-weight: 500;
  margin: 2.5rem 3rem 2rem; /* Increased margins */
  max-width: 85%;
  line-height: 1.6;
  opacity: 0.92;
  background: rgba(0, 0, 0, 0.6);
  padding: 2rem 2.5rem; /* More padding */
  border-radius: 25px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(0, 255, 255, 0.2);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
}

/* ENHANCED BALLOON CARS */
.balloonCar {
  height: clamp(85px, 38vw, 135px);
  width: auto;
  animation: floatUp 14s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
  filter: drop-shadow(0 8px 20px rgba(0,255,255,0.4));
  transform-origin: bottom;
}

.balloonCar:nth-child(odd) { animation-delay: 0s; }
.balloonCar:nth-child(2n) { animation-delay: -3s; }
.balloonCar:nth-child(3n) { animation-delay: -6s; }
.balloonCar:nth-child(4n) { animation-delay: -9s; }

@keyframes floatUp {
  0% {
    transform: translateY(100vh) rotate(-3deg) scale(0.7);
    opacity: 0;
  }
  8% {
    opacity: 1;
  }
  92% {
    opacity: 1;
  }
  100% {
    transform: translateY(-150px) rotate(3deg) scale(1.05);
    opacity: 0;
  }
}

/* REVERSED RACING CAR (left to right) */
.car {
  position: absolute;
  bottom: 100px;
  width: clamp(130px, 36vw, 200px);
  height: auto;
  animation: raceReverse 7s cubic-bezier(0.23, 1, 0.32, 1) infinite;
  filter: drop-shadow(0 12px 25px rgba(255,50,50,0.6));
  z-index: 10;
}

@keyframes raceReverse {
  0% {
    transform: translateX(-30vw) rotate(-1deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateX(130vw) rotate(1deg);
    opacity: 0;
  }
}

/* UPGRADED CONFETTI */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: confettiFall 5s linear infinite;
  box-shadow: 0 0 8px currentColor;
}

@keyframes confettiFall {
  0% {
    transform: translateY(-100vh) rotate(0deg);
    opacity: 0;
  }
  8% {
    opacity: 1;
  }
  92% {
    opacity: 1;
  }
  100% {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}

/* PARTICLE BURST */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  pointer-events: none;
  animation: burst 2.5s ease-out forwards;
}

@keyframes burst {
  0% {
    transform: scale(0) translate(0, 0);
    opacity: 1;
  }
  100% {
    transform: scale(1) translate(var(--dx), var(--dy));
    opacity: 0;
  }
}

/* RESPONSIVE GRID */
.balloon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 1.2rem;
  max-width: 450px;
  margin: 2.5rem 0; /* Increased margin */
  padding: 0 2rem;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 480px) {
  body {
    padding: 1.5rem;
  }
  
  .message {
    margin: 2rem 1.5rem;
    padding: 1.5rem 2rem;
  }
  
  h1 {
    margin-bottom: 1.2rem;
  }
  
  .balloon-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 0.8rem;
    margin: 2rem 0;
    padding: 0 1rem;
  }
}
</style>
</head>

<body>
  <!-- STARFIELD -->
  <div class="stars" id="stars"></div>

  <!-- MAIN TITLE -->
  <h1 class="glow">HAPPY BIRTHDAY YASHU <i class="fas fa-rocket"></i></h1>

  <!-- BALLOON GRID -->
  <div class="balloon-grid">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
  </div>

  <!-- MESSAGE -->
  <div class="message glow">
    <i class="fas fa-fire" style="color: #ff6b35; margin-right: 0.5rem;"></i>
    Wishing you SPEED, SUCCESS, and a year full of EPIC adventures! 
    <i class="fas fa-bolt" style="color: #ffd23f; margin-left: 0.5rem;"></i>
  </div>

  <!-- REVERSED RACING CAR -->
  <img class="car" src="https://static.thenounproject.com/png/3880204-200.png" alt="Racing Car">

  <script>
    // ENHANCED STARFIELD
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = star.style.height = (Math.random() * 2.5 + 0.8) + 'px';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 2.5 + 2.5) + 's';
        starsContainer.appendChild(star);
      }
    }

    // UPGRADED CONFETTI
    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          let c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "vw";
          c.style.animationDelay = Math.random() * 6 + "s";
          c.style.animationDuration = (4 + Math.random() * 3) + "s";
          
          const colors = ['#ff4d6d', '#7b68ee', '#4a90e2', '#00d4aa', '#ffaa00', '#ff6347'];
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '20% 80% 80% 20%';
          
          document.body.appendChild(c);
          
          setTimeout(() => c.remove(), 10000);
        }, i * 120);
      }
    }

    // PARTICLE BURST ON LOAD
    function createParticleBurst(x, y) {
      for (let i = 0; i < 16; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.backgroundColor = ['#ff4d6d', '#7b68ee', '#4a90e2', '#00d4aa'][Math.floor(Math.random() * 4)];
        particle.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px');
        particle.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px');
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 2500);
      }
    }

    // INIT
    window.addEventListener('load', () => {
      createStars();
      createConfetti();
      
      setTimeout(() => {
        createParticleBurst(window.innerWidth / 2, window.innerHeight / 2);
      }, 600);
      
      setInterval(() => {
        createParticleBurst(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
      }, 4000);
    });

    setInterval(createConfetti, 10000);
  </script>
</body>
</html>
