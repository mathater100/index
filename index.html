<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yashu 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: 'Orbitron', 'Exo 2', sans-serif;
  color: #fff;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(135deg, #000 0%, #0a0a15 30%, #120a20 60%, #0a0a15 100%);
  background-size: 300% 300%;
  animation: gradientShift 15s ease infinite;
  position: relative;
  padding: 3rem 2rem;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.glow {
  text-shadow: 
    0 0 12px rgba(0, 220, 255, 0.6),
    0 0 25px rgba(0, 220, 255, 0.4),
    0 0 40px rgba(150, 0, 255, 0.3);
  animation: pulseGlow 4s ease-in-out infinite alternate;
}

@keyframes pulseGlow {
  from { filter: brightness(0.95); }
  to { filter: brightness(1.05); }
}

h1 {
  font-size: clamp(2rem, 6.5vw, 4rem);
  font-weight: 900;
  margin: 0 0 2rem 0;
  letter-spacing: 0.06em;
  position: relative;
  padding: 0 1.5rem;
  line-height: 1.1;
}

h1::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.7), transparent);
  border-radius: 1px;
  animation: shimmer 5s infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.3; width: 70px; }
  50% { opacity: 0.8; width: 140px; }
}

.message {
  font-size: clamp(0.95rem, 2.5vw, 1.3rem);
  font-weight: 500;
  margin: 3rem 4rem 2.5rem;
  max-width: 80%;
  line-height: 1.7;
  opacity: 0.88;
  background: rgba(5, 5, 15, 0.8);
  padding: 2.5rem 3rem;
  border-radius: 30px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0, 220, 255, 0.15);
  box-shadow: 
    0 25px 50px rgba(0, 0, 0, 0.7),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.balloonCar {
  height: clamp(80px, 35vw, 130px);
  width: auto;
  animation: floatUp 16s cubic-bezier(0.22, 0.5, 0.3, 1) infinite;
  filter: drop-shadow(0 6px 18px rgba(0,220,255,0.3));
}

.balloonCar:nth-child(odd) { animation-delay: -1s; }
.balloonCar:nth-child(2n) { animation-delay: -4s; }
.balloonCar:nth-child(3n) { animation-delay: -8s; }

@keyframes floatUp {
  0% { transform: translateY(110vh) rotate(-2deg) scale(0.6); opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { transform: translateY(-200px) rotate(2deg) scale(1); opacity: 0; }
}

.car {
  position: absolute;
  bottom: 80px;
  left: -15%;
  width: 75px;
  height: 55px;
  animation: raceRightToLeft 12s cubic-bezier(0.23, 0.12, 0.34, 1.1) infinite;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 15px rgba(255,255,255,0.3));
  z-index: 25;
  color:white;
}

/* @keyframes raceRightToLeft {
  0% { transform: translateX(0) scale(1); opacity: 0; }
  5% { opacity: 1; }
  90% { transform: translateX(100px) scale(1.02) opacity: 1; }
  95% { opacity: 1; }
  100% { transform: translateX(750px) scale(1.02) opacity: 0; }
}

@media (max-width: 768px) {
  .car { animation-duration: 10s; bottom: clamp(60px, 10vw, 90px); }
}

@media (max-width: 480px) {
  .car { animation-duration: 8s; width: clamp(90px, 32vw, 180px); }
} */

.confetti {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  animation: confettiFall 6s linear infinite;
}

@keyframes confettiFall {
  0% { transform: translateY(-120vh) rotateZ(0deg); opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { transform: translateY(120vh) rotateZ(1080deg); opacity: 0; }
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: burst 3s ease-out forwards;
}

@keyframes burst {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(1) translate(var(--dx), var(--dy)); opacity: 0; }
}

.balloon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 1.5rem;
  max-width: 500px;
  margin: 3rem 0;
  padding: 1rem 3rem;
}

@media (max-width: 480px) {
  body { padding: 2rem 1.5rem; }
  .message { margin: 2.5rem 2rem; padding: 2rem 2.5rem; }
  h1 { margin-bottom: 1.5rem; }
  .balloon-grid { 
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    margin: 2rem 0;
    padding: 0 1.5rem;
  }
}
</style>
</head>

<body>
  <div class="stars" id="stars"></div>

  <h1 class="glow">HAPPY BIRTHDAY YASHU <i class="fas fa-rocket"></i></h1>

  <div class="balloon-grid">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
    <img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx" alt="Balloon Car">
  </div>

  <div class="message glow">
    <i class="fas fa-fire" style="color: #ff6b35;"></i>
    Wishing you SPEED, SUCCESS, and a year full of EPIC adventures! 
    <i class="fas fa-bolt" style="color: #ffd23f;"></i>
  </div>

  <img class="car" src="https://static.thenounproject.com/png/3880204-200.png" alt="Racing Car">

  <script>
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = star.style.height = (0.5 + Math.random() * 2) + 'px';
        star.style.animationDelay = Math.random() * 4 + 's';
        container.appendChild(star);
      }
    }

    function createConfetti() {
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.animationDelay = Math.random() * 8 + 's';
          c.style.animationDuration = 5 + Math.random() * 4 + 's';
          c.style.background = ['#ff4d6d', '#7b68ee', '#4a90e2', '#00d4aa', '#ffaa00'][Math.floor(Math.random() * 5)];
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 14000);
        }, i * 150);
      }
    }

    function createParticleBurst(x, y) {
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.background = ['#ff4d6d', '#7b68ee', '#4a90e2'][Math.floor(Math.random() * 3)];
        p.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 120 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }
    }

    window.addEventListener('load', () => {
      createStars();
      createConfetti();
      setTimeout(() => createParticleBurst(innerWidth/2, innerHeight/2), 800);
      setInterval(() => createParticleBurst(Math.random()*innerWidth, Math.random()*innerHeight), 5000);
    });
    setInterval(createConfetti, 12000);
  </script>
</body>
</html>
