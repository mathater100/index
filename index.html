<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Yashu</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

/* PAGE */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
overflow:hidden;

background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIayRvS_FHtu6_DGAzjgmfsUD-7rEqvTabzw&s");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* DARK OVERLAY */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* TITLE */

h1{
font-size:60px;
text-shadow:0 0 20px cyan;
margin-bottom:10px;
}

/* MESSAGE */

.message{
font-size:22px;
margin-top:10px;
}

/* BALLOON CARS */

.balloonCar{
height:90px;
animation:up 10s linear infinite;
margin:10px;
}

@keyframes up{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-120vh);
}
}

/* MOVING CAR */

.car{
position:absolute;
bottom:60px;
width:160px;
animation:drive 8s linear infinite;
color:green;
height:200px;
}

@keyframes drive{
0%{
left:1500px;
}
100%{
left:-110%;
}
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100vh);
}
100%{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<h1>Happy Birthday Yashu 🎉</h1>

<div>

<img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx">
<img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx">
<img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx">

</div>

<div class="message">
Wishing you speed, success and a year full of amazing adventures 🔥
</div>

<img class="car" src="https://static.thenounproject.com/png/3880204-200.png";>

<script>

/* CONFETTI GENERATOR */

for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)];
c.style.animationDuration=3+Math.random()*5+"s";
document.body.appendChild(c);
}

</script>

</body>
</html>
