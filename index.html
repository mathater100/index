<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Bro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
overflow:hidden;

background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIayRvS_FHtu6_DGAzjgmfsUD-7rEqvTabzw&s");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* TITLE */

h1{
font-size:clamp(32px,8vw,60px);
text-shadow:0 0 15px cyan;
}

/* MESSAGE */

.message{
font-size:clamp(16px,4vw,22px);
margin-top:10px;
padding:0 20px;
}

/* BALLOON CARS */

.balloonCar{
height:clamp(100px,45vw,150px);
width:clamp(75px,20vw,110px);
animation:up 10s linear infinite;
}

@keyframes up{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-100vh);
}
}

/* CAR */

.car{
position:absolute;
bottom:65px;
width:clamp(120px,35vw,180px);
right:200px;
animation:drive 8s linear infinite;
}

@keyframes drive{
0%{
right:200px;
}
100%{
left:110%;
}
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100vh);
}
100%{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<h1>Happy Birthday Yashu 🎉</h1>

<img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx">

<table>
<tr>
<td><img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx"></td>
<td><img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx"></td>
</tr>

<tr>
<td><img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx"></td>
<td><img class="balloonCar" src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f388/u1f388_u1f3ce-ufe0f.png?fbx"></td>
</tr>
</table>

<div class="message">
Wishing you speed, success and a year full of amazing adventures 🔥
</div>

<img class="car" src="https://static.thenounproject.com/png/3880204-200.png">

<script>

for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)];
c.style.animationDuration=3+Math.random()*5+"s";
document.body.appendChild(c);
}

</script>

</body>
</html>
